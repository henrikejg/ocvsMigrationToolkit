<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCVS Migration Dashboard v0.4.0</title>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

  /* ── Layout base ── */
  #app-shell { display: flex; flex-direction: column; min-height: 100vh; }

  /* ── Header ── */
  header {
    background: #1e293b; border-bottom: 1px solid #334155;
    padding: 0 16px 0 0; height: 52px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 50;
  }
  .btn-hamburger {
    background: none; border: none; cursor: pointer; color: #94a3b8;
    border-radius: 0; display: flex; flex-direction: column;
    gap: 4px; flex-shrink: 0;
    width: 48px; height: 52px; align-items: center; justify-content: center;
  }
  .btn-hamburger:hover { background: #334155; color: #f1f5f9; }
  .btn-hamburger span {
    display: block; width: 18px; height: 2px; background: currentColor;
    border-radius: 2px; transition: all 0.2s;
  }
  header h1 { font-size: 1.1rem; font-weight: 600; color: #f1f5f9; white-space: nowrap; }
  header h1 small { font-size: 0.65rem; color: #475569; font-weight: 400; margin-left: 4px; }
  #excel-path { font-size: 0.75rem; color: #475569; white-space: nowrap; overflow: hidden;
                text-overflow: ellipsis; max-width: 200px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .onda-select { display: flex; align-items: center; gap: 8px; }
  .onda-select label { font-size: 0.85rem; color: #94a3b8; white-space: nowrap; }
  select { background: #334155; color: #f1f5f9; border: 1px solid #475569;
           padding: 6px 12px; border-radius: 6px; font-size: 0.9rem; cursor: pointer; }
  select:focus { outline: none; border-color: #3b82f6; }

  /* ── Body row (sidebar + main) ── */
  #body-row { display: flex; flex: 1; }

  /* ── Sidebar ── */
  #sidebar {
    width: 48px; overflow: hidden;
    background: #1e293b; border-right: 1px solid #334155;
    display: flex; flex-direction: column;
    transition: width 0.25s ease;
    flex-shrink: 0;
  }
  #sidebar.open { width: 240px; }
  #sidebar-inner { width: 240px; padding: 16px 0; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }

  /* Quando recolhido: esconder textos, centralizar ícones */
  #sidebar:not(.open) #sidebar-inner { width: 48px; align-items: center; }
  #sidebar:not(.open) .sb-section { display: none; }
  #sidebar:not(.open) .sb-btn {
    justify-content: center; padding: 10px 0; width: 48px; gap: 0;
  }
  #sidebar:not(.open) .sb-btn .sb-icon { width: 22px; height: 22px; }
  #sidebar:not(.open) .sb-btn span:not(.sb-icon) { display: none; }
  #sidebar:not(.open) .sb-divider { margin: 6px 10px; width: 28px; }

  .sb-section {
    padding: 8px 16px 4px;
    font-size: 0.68rem; font-weight: 600; color: #475569;
    text-transform: uppercase; letter-spacing: 0.08em;
    white-space: nowrap;
  }
  .sb-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; font-size: 0.85rem; color: #94a3b8;
    background: none; border: none; cursor: pointer; width: 100%; text-align: left;
    border-radius: 0; transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .sb-btn:hover { background: #263348; color: #f1f5f9; }
  .sb-btn .sb-icon { width: 18px; height: 18px; flex-shrink: 0; }
  .sb-divider { height: 1px; background: #334155; margin: 8px 8px; }

  /* Seletor de tipo de conexão na sidebar */
  .sb-select-wrap { padding: 6px 16px; display: flex; flex-direction: column; gap: 4px; }
  .sb-select-wrap label { font-size: 0.78rem; color: #64748b; }
  .sb-select-wrap select { width: 100%; font-size: 0.82rem; padding: 5px 8px; }

  /* ── Main content ── */
  #main-wrap { flex: 1; min-width: 0; }
  main { padding: 24px; display: grid; gap: 20px; }

  /* ── Botão refresh genérico ── */
  .btn-refresh { background: #1d4ed8; color: white; border: none; padding: 6px 14px;
                 border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
  .btn-refresh:hover { background: #2563eb; }

  /* ── Cards ── */
  .cards-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 20px; }
  .card h2 { font-size: 0.8rem; color: #64748b; text-transform: uppercase;
             letter-spacing: 0.05em; margin-bottom: 8px; }
  .card .valor { font-size: 2rem; font-weight: 700; color: #f1f5f9; }
  .card .sub { font-size: 0.75rem; color: #64748b; margin-top: 4px; }
  .panel { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 20px; }
  .panel h2 { font-size: 1rem; font-weight: 600; color: #f1f5f9; margin-bottom: 16px;
              display: flex; align-items: center; gap: 8px; }
  .panel h2 .badge { font-size: 0.7rem; background: #334155; color: #94a3b8;
                     padding: 2px 8px; border-radius: 99px; font-weight: 400; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th { text-align: left; padding: 8px 10px; color: #64748b; font-weight: 500;
       border-bottom: 1px solid #334155; white-space: nowrap; }
  td { padding: 7px 10px; border-bottom: 1px solid #1e293b; color: #cbd5e1; }
  tr:hover td { background: #263348; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 0.72rem; font-weight: 500; }
  .tag-ocvs     { background: #14532d; color: #86efac; }
  .tag-fora     { background: #450a0a; color: #fca5a5; }
  .tag-in       { background: #1e3a5f; color: #93c5fd; }
  .tag-out      { background: #3b1f5e; color: #c4b5fd; }
  .tag-analisar { background: #422006; color: #fcd34d; }
  .bar-wrap { display: flex; flex-direction: column; gap: 10px; }
  .bar-item { display: flex; flex-direction: column; gap: 4px; cursor: pointer;
              padding: 6px 8px; border-radius: 6px; transition: background 0.15s; }
  .bar-item:hover { background: #263348; }
  .bar-item:hover .bar-label span:first-child { color: #93c5fd; }
  .bar-label { display: flex; justify-content: space-between; font-size: 0.8rem; }
  .bar-label span:first-child { color: #cbd5e1; }
  .bar-label span:last-child  { color: #94a3b8; }
  .bar-track { height: 8px; background: #334155; border-radius: 4px; overflow: hidden; }
  .bar-fill  { height: 100%; border-radius: 4px; transition: width 0.5s; }
  .loading { color: #475569; font-size: 0.9rem; padding: 20px 0; text-align: center; }
  .empty   { color: #475569; font-size: 0.85rem; padding: 20px 0; text-align: center; }
  .search  { background: #0f172a; border: 1px solid #334155; color: #e2e8f0;
             padding: 7px 12px; border-radius: 6px; font-size: 0.85rem; width: 100%;
             margin-bottom: 12px; }
  .search:focus { outline: none; border-color: #3b82f6; }
  .tab-bar { display: flex; gap: 4px; margin-bottom: 16px; }
  .tab { padding: 6px 14px; border-radius: 6px; font-size: 0.82rem; cursor: pointer;
         background: #334155; color: #94a3b8; border: none; }
  .tab.active { background: #1d4ed8; color: white; }
  .grafo-container { width: 100%; height: 500px; background: #0f172a;
                     border-radius: 8px; overflow: hidden; position: relative; }
  canvas { display: block; }
  .tooltip { position: fixed; background: #1e293b; border: 1px solid #334155;
             padding: 8px 12px; border-radius: 6px; font-size: 0.78rem; color: #e2e8f0;
             pointer-events: none; z-index: 100; display: none; max-width: 280px; }
  .no-onda { display: flex; flex-direction: column; align-items: center; justify-content: center;
             height: 60vh; gap: 12px; color: #475569; }
  .no-onda svg { width: 48px; height: 48px; opacity: 0.3; }
  .contador-badge { font-weight: 700; color: #f1f5f9; }
  .alert { background: #450a0a; border: 1px solid #7f1d1d; border-radius: 8px;
           padding: 12px 16px; font-size: 0.85rem; color: #fca5a5; }
  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7);
                   z-index: 200; display: flex; align-items: center; justify-content: center; }
  .modal { background: #1e293b; border: 1px solid #334155; border-radius: 12px;
           width: 90vw; max-width: 1100px; max-height: 85vh;
           display: flex; flex-direction: column; overflow: hidden; }
  .modal-header { padding: 16px 20px; border-bottom: 1px solid #334155;
                  display: flex; align-items: center; justify-content: space-between; }
  .modal-header h3 { font-size: 1rem; font-weight: 600; color: #f1f5f9; }
  .modal-header .sub { font-size: 0.8rem; color: #64748b; margin-top: 2px; }
  .modal-close { background: none; border: none; color: #64748b; font-size: 1.4rem;
                 cursor: pointer; padding: 0 4px; line-height: 1; }
  .modal-close:hover { color: #f1f5f9; }
  .modal-search { padding: 12px 20px; border-bottom: 1px solid #334155; }
  .modal-body { overflow-y: auto; flex: 1; }
  .modal-body table { width: 100%; }
  .modal-body th { position: sticky; top: 0; background: #1e293b; z-index: 1; }
  /* Terminal */
  .terminal { background: #020617; border-radius: 8px; padding: 16px; font-family: 'Consolas','Courier New',monospace;
              font-size: 0.78rem; height: 380px; overflow-y: auto; color: #94a3b8; }
  .terminal .log     { color: #94a3b8; }
  .terminal .info    { color: #38bdf8; }
  .terminal .erro    { color: #f87171; }
  .terminal .sucesso { color: #4ade80; font-weight: 600; }
  .terminal .warn    { color: #fbbf24; }
  .terminal .sep     { color: #334155; }
  .form-row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .form-row input { background: #0f172a; border: 1px solid #334155; color: #e2e8f0;
                    padding: 7px 12px; border-radius: 6px; font-size: 0.85rem; flex: 1; min-width: 120px; }
  .form-row input:focus { outline: none; border-color: #3b82f6; }
  .btn-exec  { padding: 7px 20px; border-radius: 6px; border: none; cursor: pointer;
               font-size: 0.85rem; font-weight: 600; }
  .btn-run   { background: #16a34a; color: white; }
  .btn-run:hover   { background: #15803d; }
  .btn-run:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
  /* Árvore de servidores */
  .tree { font-size: 0.82rem; }
  .tree-row { display: grid; align-items: center; padding: 5px 8px; border-radius: 4px;
              cursor: pointer; user-select: none; }
  .tree-row:hover { background: #263348; }
  .tree-servidor { grid-template-columns: 1fr 110px 90px 90px;
                   font-weight: 600; color: #f1f5f9; background: #263348;
                   border-left: 3px solid #3b82f6; margin-bottom: 2px; border-radius: 4px; }
  .tree-aplicacao { grid-template-columns: 1fr 110px 90px 90px;
                    padding-left: 20px; color: #94a3b8; font-style: italic; }
  .tree-ip        { grid-template-columns: 1fr 110px 90px 90px;
                    padding-left: 40px; color: #cbd5e1; }
  .tree-porta     { grid-template-columns: 1fr 110px 90px 90px;
                    padding-left: 60px; color: #64748b; cursor: default; }
  .tree-header    { grid-template-columns: 1fr 110px 90px 90px;
                    color: #475569; font-size: 0.75rem; text-transform: uppercase;
                    letter-spacing: 0.05em; padding: 4px 8px; margin-bottom: 4px; }
  .tree-num { text-align: right; }
  .tree-num.est  { color: #86efac; }
  .tree-num.syn  { color: #fcd34d; }
  .tree-num.tot  { color: #f1f5f9; font-weight: 600; }
  .tree-toggle { display: inline-block; width: 14px; text-align: center;
                 color: #64748b; font-size: 0.7rem; margin-right: 4px; }
  .collapsed > .tree-children { display: none; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="app-shell">

<!-- ── Header ── -->
<header>
  <button class="btn-hamburger" onclick="toggleSidebar()" title="Menu" aria-label="Abrir menu">
    <span></span><span></span><span></span>
  </button>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" style="flex-shrink:0">
    <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
  </svg>
  <h1 style="cursor:pointer" onclick="ondaAtual='';document.getElementById('sel-onda').value='';renderHome()">OCVS Migration Dashboard <small>v0.4.0</small></h1>
  <span id="excel-path"></span>
  <div class="header-right">
    <div class="onda-select">
      <label>Onda:</label>
      <select id="sel-onda"><option value="">-- selecione --</option></select>
      <label style="margin-left:10px">Conexão:</label>
      <select id="sel-ocvs">
        <option value="OCVS" selected>Apenas OCVS</option>
        <option value="FORA">Apenas Fora do OCVS</option>
        <option value="">Todos</option>
      </select>
    </div>
    <span id="db-badge" style="display:none;font-size:0.72rem;padding:3px 10px;border-radius:99px;font-weight:500"></span>
  </div>
</header>

<!-- ── Body row ── -->
<div id="body-row">

  <!-- ── Sidebar ── -->
  <nav id="sidebar">
    <div id="sidebar-inner">

      <div class="sb-section">Coleta e Processamento</div>
      <button class="sb-btn" onclick="abrirTelaColeta()">
        <i data-lucide="download" class="sb-icon"></i><span> Coletar Linux</span>
      </button>
      <button class="sb-btn" onclick="abrirTelaServidores()">
        <i data-lucide="cog" class="sb-icon"></i><span> Processar Servidores</span>
      </button>

      <div class="sb-divider"></div>
      <div class="sb-section">Banco de Dados</div>
      <button class="sb-btn" onclick="atualizarTodasOndas()">
        <i data-lucide="refresh-cw" class="sb-icon"></i><span> Atualizar Ondas</span>
      </button>
      <button class="sb-btn" onclick="reingerirTudo()">
        <i data-lucide="database" class="sb-icon"></i><span> Reingerir Banco</span>
      </button>

      <div class="sb-divider"></div>
      <div class="sb-section">Sistema</div>
      <button class="sb-btn" onclick="limparCache()">
        <i data-lucide="rotate-ccw" class="sb-icon"></i><span> Recarregar Cache</span>
      </button>
      <button class="sb-btn" onclick="abrirLogs()">
        <i data-lucide="file-text" class="sb-icon"></i><span> Logs de Execução</span>
      </button>

    </div>
  </nav>

  <!-- ── Main ── -->
  <div id="main-wrap">
    <div class="tooltip" id="tooltip"></div>
    <main id="main">
      <div class="loading">Carregando visão geral...</div>
    </main>
  </div>

</div><!-- #body-row -->
</div><!-- #app-shell -->

<div id="modal-root"></div>

<script>
const API = "";
let ondaAtual = "";
let _mapaAmbiente = {};

// ── Sidebar ───────────────────────────────────────────────────────────────────
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
async function init() {
  const [ondas, excel] = await Promise.all([
    fetch(`${API}/api/ondas`).then(r => r.json()),
    fetch(`${API}/api/excel`).then(r => r.json()),
  ]);
  try { _mapaAmbiente = await fetch(`${API}/api/mapa-ambiente`).then(r => r.json()); } catch {}

  const sel = document.getElementById("sel-onda");
  ondas.forEach(o => {
    const opt = document.createElement("option");
    opt.value = o; opt.textContent = `Onda ${o}`;
    sel.appendChild(opt);
  });
  sel.addEventListener("change", e => { ondaAtual = e.target.value; if (ondaAtual) renderDashboard(); else renderHome(); });
  document.getElementById("sel-ocvs").addEventListener("change", () => { if (ondaAtual) renderDashboard(); });

  if (excel.path) {
    document.getElementById("excel-path").textContent = excel.path.split(/[\\/]/).pop();
  }

  // Renderizar ícones Lucide
  if (typeof lucide !== "undefined") lucide.createIcons();

  // Mostrar tela inicial
  renderHome();
}

// ── Tela inicial — visão geral das ondas ──────────────────────────────────────
async function renderHome() {
  const main = document.getElementById("main");
  main.innerHTML = `<div class="loading">Carregando visão geral...</div>`;

  try {
    const [excelInfo, dados] = await Promise.all([
      fetch(`${API}/api/excel`).then(r => r.json()),
      fetch(`${API}/api/visao-geral`).then(r => r.json()),
    ]);

    // Painel de Excel
    const excelNome = excelInfo.path ? excelInfo.path.split(/[\\/]/).pop() : null;
    const excelDir  = excelInfo.path ? excelInfo.path.replace(/[\\/][^\\/]+$/, '') : null;
    const excelHTML = excelInfo.found
      ? `<div class="panel" style="padding:12px 20px;display:flex;align-items:center;gap:12px;border-color:#166534">
          <i data-lucide="file-spreadsheet" style="width:20px;height:20px;color:#4ade80;flex-shrink:0"></i>
          <div style="flex:1;min-width:0">
            <div style="font-size:0.88rem;color:#f1f5f9;font-weight:500">${excelNome}</div>
            <div style="font-size:0.72rem;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${excelInfo.path}">${excelDir}</div>
          </div>
          <button class="btn-refresh" style="font-size:0.78rem;padding:4px 12px;background:#334155" onclick="selecionarExcel()">Alterar</button>
        </div>`
      : `<div class="panel" style="padding:20px;text-align:center;border-color:#7f1d1d">
          <div style="color:#fca5a5;font-size:0.9rem;margin-bottom:12px">Nenhuma planilha Excel configurada</div>
          <div style="color:#64748b;font-size:0.82rem;margin-bottom:16px">Selecione o arquivo Excel com os dados dos servidores e ondas para começar.</div>
          <button class="btn-refresh" style="background:#1d4ed8" onclick="selecionarExcel()">
            <i data-lucide="folder-open" style="width:14px;height:14px;vertical-align:middle;margin-right:6px"></i>Selecionar Planilha
          </button>
        </div>`;

    const ultimoLogHTML = dados.ultimoLog
      ? `${dados.ultimoLog.script} — Onda ${dados.ultimoLog.onda} — ${new Date(dados.ultimoLog.inicio).toLocaleString("pt-BR")} — ${dados.ultimoLog.exitCode === 0 ? '<span style="color:#4ade80">OK</span>' : '<span style="color:#f87171">Erro</span>'}`
      : '<span style="color:#475569">Nenhuma execução registrada</span>';

    const rowsHTML = dados.ondas.map(o => {
      const statusTag = o.ingerida
        ? '<span class="tag tag-ocvs">No banco</span>'
        : o.processada
          ? '<span class="tag" style="background:#422006;color:#fcd34d">Processada</span>'
          : '<span class="tag" style="background:#334155;color:#64748b">Pendente</span>';

      let acoesHTML = '';
      if (o.ingerida) {
        acoesHTML = `<button class="btn-refresh" style="font-size:0.78rem;padding:4px 12px"
                      onclick="event.stopPropagation();selecionarOnda('${o.numero}')">Abrir</button>`;
      } else if (o.processada) {
        acoesHTML = `<button class="btn-refresh" style="font-size:0.78rem;padding:4px 10px;background:#7c3aed"
                      onclick="event.stopPropagation();abrirExecucao('processar','${o.numero}')">Processar</button>
                     <button class="btn-refresh" style="font-size:0.78rem;padding:4px 12px"
                      onclick="event.stopPropagation();selecionarOnda('${o.numero}')">Abrir</button>`;
      } else {
        acoesHTML = `<button class="btn-refresh" style="font-size:0.78rem;padding:4px 10px;background:#16a34a"
                      onclick="event.stopPropagation();abrirExecucao('coletar','${o.numero}')">Coletar</button>
                     <button class="btn-refresh" style="font-size:0.78rem;padding:4px 10px;background:#7c3aed"
                      onclick="event.stopPropagation();abrirExecucao('processar','${o.numero}')">Processar</button>`;
      }

      return `<tr${o.ingerida || o.processada ? ' style="cursor:pointer" onclick="selecionarOnda(\'' + o.numero + '\')"' : ''}>
        <td style="font-weight:600;color:#f1f5f9">Onda ${o.numero}</td>
        <td>${o.previstos}</td>
        <td>${statusTag}</td>
        <td>${o.ingerida ? o.conexoesBD.toLocaleString("pt-BR") : '—'}</td>
        <td style="display:flex;gap:6px;justify-content:flex-end">${acoesHTML}</td>
      </tr>`;
    }).join("");

    main.innerHTML = `
      ${excelHTML}

      <div class="cards-row">
        ${cardHTML("Ondas no Excel", dados.totalOndasExcel, "definidas na planilha")}
        ${cardHTML("Ondas processadas", dados.totalOndasProcessadas, "com arquivo .txt gerado")}
        ${cardHTML("Ondas no banco", dados.totalOndasIngeridas, "ingeridas no SQLite")}
        <div class="card">
          <h2>Última execução</h2>
          <div style="font-size:0.85rem;color:#cbd5e1;margin-top:8px;line-height:1.5">${ultimoLogHTML}</div>
        </div>
      </div>

      <div class="panel">
        <h2>Ondas <span class="badge">${dados.ondas.length} ondas encontradas</span></h2>
        <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>Onda</th>
            <th>Servidores previstos</th>
            <th>Status</th>
            <th>Conexões no banco</th>
            <th></th>
          </tr></thead>
          <tbody>${rowsHTML || '<tr><td colspan="5" class="empty">Nenhuma onda encontrada</td></tr>'}</tbody>
        </table>
        </div>
      </div>
    `;
    if (typeof lucide !== "undefined") lucide.createIcons();
  } catch (e) {

function ordenarColeta(col) {
  if (_coletaSort.col === col) {
    _coletaSort.asc = !_coletaSort.asc;
  } else {
    _coletaSort.col = col;
    _coletaSort.asc = true;
  }
  const lista = window._coletaLista;
  lista.sort((a, b) => {
    let va = a[col] || "", vb = b[col] || "";
    if (typeof va === "number" && typeof vb === "number") return _coletaSort.asc ? va - vb : vb - va;
    va = String(va).toLowerCase(); vb = String(vb).toLowerCase();
    return _coletaSort.asc ? va.localeCompare(vb) : vb.localeCompare(va);
  });
  document.getElementById("tbody-coleta").innerHTML = renderLinhasColeta(lista);

async function executarColetaSelecionados() {
  const selecionados = [...document.querySelectorAll(".chk-coleta:checked")];
  if (selecionados.length === 0) { alert("Selecione ao menos um servidor."); return; }

  const usuario = document.getElementById("coleta-usuario")?.value.trim() || "migracao";
  const senha   = document.getElementById("coleta-senha")?.value || "";
  if (!senha) { alert("Informe a senha SSH."); return; }

  const ips = selecionados.map(c => c.value).join(",");

  // Precisamos de uma onda para o script — usar "0" como placeholder
  // O script Coletar-Linux.ps1 precisa de -NumeroOnda mas vamos usar -ServidoresSelecionados
  const modal = document.getElementById("modal-root");
  modal.innerHTML = `
    <div class="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <div><h3>Coletar Linux</h3><div class="sub" id="exec-sub">Coletando ${selecionados.length} servidor(es)...</div></div>
          <button class="modal-close" onclick="fecharModal()">&#x2715;</button>
        </div>
        <div class="modal-body" style="padding:0">
          <div class="terminal" id="terminal"></div>
        </div>
      </div>
    </div>`;

  window._execRunning = true;
  const term = document.getElementById("terminal");
  const addLinha = (linha, tipo) => {
    if (!tipo || tipo === "log") {
      const l = linha.trim();
      if (/^\s*v /.test(l) || /sucesso|concluido|ok\b/i.test(l))  tipo = "sucesso";
      else if (/^\s*x /.test(l) || /falha|erro|fail/i.test(l))    tipo = "erro";
      else if (/^\s*! /.test(l) || /aviso|warn|aten/i.test(l))    tipo = "warn";
      else if (/^={3,}|^-{3,}/.test(l))                           tipo = "sep";
      else if (/iniciando|verificando|copiando|transferindo|extraindo/i.test(l)) tipo = "info";
    }
    const span = document.createElement("span");
    span.className = tipo || "log";
    span.textContent = linha;
    term.appendChild(span);
    term.appendChild(document.createElement("br"));
    term.scrollTop = term.scrollHeight;
  };

  try {
    const resp = await fetch(`${API}/api/executar`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ script: "coletar", onda: "0", usuario, senha, servidoresSelecionados: ips }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const events = buffer.split("\n\n");
      buffer = events.pop();
      for (const ev of events) {
        const dataLine = ev.split("\n").find(l => l.startsWith("data:"));
        if (!dataLine) continue;
        try {
          const obj = JSON.parse(dataLine.slice(5));
          if (obj.tipo === "fim") {
            window._execRunning = false;
            document.getElementById("exec-sub").textContent = "Concluído";
          } else {
            addLinha(obj.linha, obj.tipo);
          }
        } catch {}
      }
    }
  } catch (e) {
    addLinha("Erro de conexão: " + e.message, "erro");
    window._execRunning = false;
  }
}

      ${cardHTML("Linhas processadas", fmt(resumo.total_linhas), "após aglutinação")}
      ${cardHTML("Total de conexões", fmt(resumo.total_conexoes), "soma dos contadores")}
      ${cardHTML("Servidores na onda", fmt(resumo.servidores_previstos || "—"), `${fmt(resumo.servidores)} com dados processados`)}
      ${cardHTML("IPs remotos únicos", fmt(resumo.ips_remotos), "destinos distintos")}
    </div>

    ${panelServidoresHTML(servidores)}

    <div class="grid-2">
      <div style="display:flex;flex-direction:column;gap:20px">
        ${panelPizzaHTML(pizza)}
        <div class="panel" id="panel-so">
          <h2>Distribuição de SO <span class="badge">servidores da onda</span></h2>
          <div style="display:flex;align-items:center;gap:28px;flex-wrap:wrap">
            <div style="position:relative;flex-shrink:0">
              <canvas id="so-canvas" width="200" height="200"></canvas>
              <div id="so-center" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none"></div>
            </div>
            <div id="so-legenda" style="flex:1;display:flex;flex-direction:column;gap:6px;font-size:0.83rem;min-width:200px"></div>
          </div>
          <div id="so-voltar" style="display:none;margin-top:12px">
            <button class="btn-refresh" style="font-size:0.78rem;padding:4px 12px;background:#334155" onclick="renderSOPizza()">&#8592; Voltar</button>
          </div>
        </div>
      </div>
      ${panelTopHTML(topComm)}
    </div>
  `;

  renderPizza(pizza);
  carregarDistribuicaoSO();
  if (typeof lucide !== "undefined") lucide.createIcons();
  // Popular mensagem de maturidade no estado inicial
  recarregarServidores();
}

// ── Cards ─────────────────────────────────────────────────────────────────────
function cardHTML(titulo, valor, sub) {
  return `<div class="card">
    <h2>${titulo}</h2>
    <div class="valor">${valor}</div>
    <div class="sub">${sub}</div>
  </div>`;
}

function fmt(n) { return Number(n).toLocaleString("pt-BR"); }

// ── Painel Status Migração ────────────────────────────────────────────────────
function panelStatusHTML(status) {
  const total = Object.values(status).reduce((s, v) => s + v.conexoes, 0);

  // Map display label -> categoria key for drilldown
  const categoriaMap = {
    mesma_onda:    "mesma_onda",
    onda_anterior: "onda_anterior",
    onda_futura:   "onda_futura",
    fora_ocvs:     "fora_ocvs",
    nao_mapeado:   "nao_mapeado",
  };

  const bars = Object.entries(status).map(([k, v]) => {
    const pct = total > 0 ? Math.round(v.conexoes * 100 / total) : 0;
    const cat = categoriaMap[k] || k;
    return `<div class="bar-item" onclick="abrirDrilldown('${cat}', '${v.label.replace(/'/g,"\\'")}')">
      <div class="bar-label">
        <span>${v.label}</span>
        <span>${fmt(v.conexoes)} (${pct}%)</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct}%;background:${v.cor}"></div>
      </div>
    </div>`;
  }).join("");

  return `<div class="panel">
    <h2>Status de Migração <span class="badge">por conexões — clique para detalhar</span></h2>
    <div class="bar-wrap">${bars}</div>
  </div>`;
}

// ── Painel Top Comunicações ───────────────────────────────────────────────────
function panelTopHTML(top) {
  const rows = top.slice(0, 15).map(r => `<tr>
    <td>${ambienteIcon(r.hostname)}${r.hostname}</td>
    <td>${r.ip_remoto}</td>
    <td>${r.porta_remota}</td>
    <td>${tagDirecao(r.direcao)}</td>
    <td>${r.aplicacao || "-"}</td>
    <td>${tagOcvs(r.ocvs)}</td>
    <td class="contador-badge">${fmt(r.contador)}</td>
  </tr>`).join("");

  return `<div class="panel">
    <h2>Top Comunicações <span class="badge">por volume</span></h2>
    <div style="overflow-x:auto">
    <table>
      <thead><tr>
        <th>Origem</th><th>IP Destino</th><th>Porta</th>
        <th>Dir.</th><th>Aplicação</th><th>OCVS</th><th>Qtde</th>
      </tr></thead>
      <tbody>${rows || `<tr><td colspan="7" class="empty">Sem dados</td></tr>`}</tbody>
    </table></div>
  </div>`;
}

// ── Painel Dependências Externas ──────────────────────────────────────────────
const DEP_PAGE_SIZE = 15;
let _depDados = [];
let _depFiltrado = [];
let _depPagina = 0;

function rowDep(r) {
  return `<tr>
    <td>${ambienteIcon(r.hostname)}${r.hostname}</td>
    <td>${r.ip_remoto}</td>
    <td>${r.porta_remota}</td>
    <td>${r.aplicacao || "-"}</td>
    <td>${tagDirecao(r.direcao)}</td>
    <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
        title="${r.onda_destino}">${r.onda_destino || "-"}</td>
    <td class="contador-badge">${fmt(r.contador)}</td>
  </tr>`;
}

function renderDepRows() {
  const fim = (_depPagina + 1) * DEP_PAGE_SIZE;
  const visivel = _depFiltrado.slice(0, fim);
  const tbody = document.getElementById("tbody-dep");
  if (tbody) tbody.innerHTML = visivel.length
    ? visivel.map(rowDep).join("")
    : `<tr><td colspan="7" class="empty">Nenhuma dependência externa encontrada</td></tr>`;

  const btnMais = document.getElementById("btn-dep-mais");
  if (btnMais) {
    if (fim < _depFiltrado.length) {
      btnMais.style.display = "";
      btnMais.textContent = `Carregar mais (${_depFiltrado.length - fim} restantes)`;
    } else {
      btnMais.style.display = "none";
    }
  }
}

function carregarMaisDep() {
  _depPagina++;
  renderDepRows();
}

function panelDepExtColapsavel() {
  return `<div class="panel" id="panel-dep-wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer"
         onclick="expandirDepExt()">
      <h2 style="margin:0">Dependências Externas <span class="badge">clique para carregar</span></h2>
      <span id="dep-toggle" style="color:#64748b;font-size:1.2rem">&#9660;</span>
    </div>
    <div id="dep-conteudo" style="display:none;margin-top:16px">
      <div class="loading">Carregando...</div>
    </div>
  </div>`;
}

async function expandirDepExt() {
  const conteudo = document.getElementById("dep-conteudo");
  const toggle   = document.getElementById("dep-toggle");
  if (!conteudo) return;

  // Toggle: se ja expandido, colapsar
  if (conteudo.style.display !== "none") {
    conteudo.style.display = "none";
    if (toggle) toggle.innerHTML = "&#9660;";
    return;
  }

  conteudo.style.display = "block";
  if (toggle) toggle.innerHTML = "&#9650;";

  // Se ja tem dados carregados, nao recarregar
  if (conteudo.dataset.loaded === "1") return;

  const ocvs = document.getElementById("sel-ocvs").value;
  const qs   = ocvs ? "?ocvs=" + ocvs : "";
  const dep  = await fetch(API + "/api/onda/" + ondaAtual + "/dependencias-externas" + qs).then(r => r.json());
  conteudo.dataset.loaded = "1";
  conteudo.innerHTML = panelDepExtInner(dep);

  // Mostrar alerta se houver dependencias
  if (dep.length > 0) {
    const wrap = document.getElementById("panel-dep-wrap");
    if (wrap) wrap.style.borderColor = "#7f1d1d";
  }
}

function panelDepExtInner(dep) {
  _depDados    = dep;
  _depFiltrado = dep;
  _depPagina   = 0;

  const rows = dep.slice(0, DEP_PAGE_SIZE).map(rowDep).join("");
  const temMais = dep.length > DEP_PAGE_SIZE;

  return `<input class="search" placeholder="Filtrar por hostname, IP ou aplicação..."
           oninput="filtrarDep(this.value)">
    <div style="overflow-x:auto">
    <table id="tbl-dep">
      <thead><tr>
        <th>Servidor origem</th><th>IP destino</th><th>Porta</th>
        <th>Aplicação</th><th>Dir.</th><th>Onda destino</th><th>Qtde</th>
      </tr></thead>
      <tbody id="tbody-dep">${rows || `<tr><td colspan="7" class="empty">Nenhuma dependência externa encontrada</td></tr>`}</tbody>
    </table></div>
    <div style="text-align:center;margin-top:12px">
      <button id="btn-dep-mais" class="btn-refresh"
              style="display:${temMais ? '' : 'none'};background:#334155;font-size:0.82rem"
              onclick="carregarMaisDep()">
        Carregar mais (${dep.length - DEP_PAGE_SIZE} restantes)
      </button>
    </div>`;
}

function filtrarDep(q) {
  const ql = q.toLowerCase();
  _depFiltrado = q ? _depDados.filter(r =>
    r.hostname.toLowerCase().includes(ql) ||
    r.ip_remoto.toLowerCase().includes(ql) ||
    (r.aplicacao || "").toLowerCase().includes(ql)
  ) : _depDados;
  _depPagina = 0;
  renderDepRows();
}

// ── Tags ──────────────────────────────────────────────────────────────────────
function tagOcvs(v) {
  return v === "OCVS"
    ? `<span class="tag tag-ocvs">OCVS</span>`
    : `<span class="tag tag-fora">FORA</span>`;
}
function tagDirecao(v) {
  if (v === "IN")  return `<span class="tag tag-in">IN</span>`;
  if (v === "OUT") return `<span class="tag tag-out">OUT</span>`;
  return `<span class="tag tag-analisar">?</span>`;
}

// ── Painel Servidores de Origem ───────────────────────────────────────────────
function buildTreeLinhas(servidores) {
  return servidores.map((h, hi) => {
    const apps = h.aplicacoes.map((a, ai) => {
      const ips = a.ips.map((i, ii) => {
        const portas = i.portas.map(p => `
          <div class="tree-row tree-porta">
            <span>${p.fmt}</span>
            <span class="tree-num est">${p.ESTABLISHED ? fmt(p.ESTABLISHED) : ""}</span>
            <span class="tree-num syn">${p.SYN_SENT    ? fmt(p.SYN_SENT)    : ""}</span>
            <span class="tree-num tot">${fmt(p.ESTABLISHED + p.SYN_SENT)}</span>
          </div>`).join("");

        return `<div class="tree-node" id="ip-${hi}-${ai}-${ii}">
          <div class="tree-row tree-ip" onclick="toggleNode('ip-${hi}-${ai}-${ii}')">
            <span><span class="tree-toggle">▶</span>${i.ip} ${i.onda_destino && /Onda\s+\d+/i.test(i.onda_destino) ? `<span style="color:#64748b;font-size:0.75rem">(${i.onda_destino})</span>` : '<span style="color:#ef4444;font-size:0.75rem">(Sem onda planejada)</span>'}</span>
            <span class="tree-num est">${i.ESTABLISHED ? fmt(i.ESTABLISHED) : ""}</span>
            <span class="tree-num syn">${i.SYN_SENT    ? fmt(i.SYN_SENT)    : ""}</span>
            <span class="tree-num tot">${fmt(i.ESTABLISHED + i.SYN_SENT)}</span>
          </div>
          <div class="tree-children" style="display:none">${portas}</div>
        </div>`;
      }).join("");

      return `<div class="tree-node" id="ap-${hi}-${ai}">
        <div class="tree-row tree-aplicacao" onclick="toggleNode('ap-${hi}-${ai}')">
          <span><span class="tree-toggle">▶</span>${a.nome}</span>
          <span class="tree-num est">${a.ESTABLISHED ? fmt(a.ESTABLISHED) : ""}</span>
          <span class="tree-num syn">${a.SYN_SENT    ? fmt(a.SYN_SENT)    : ""}</span>
          <span class="tree-num tot">${fmt(a.ESTABLISHED + a.SYN_SENT)}</span>
        </div>
        <div class="tree-children" style="display:none">${ips}</div>
      </div>`;
    }).join("");

    const ambIcon = h.ambiente && /prod/i.test(h.ambiente) && !/n[aã]o/i.test(h.ambiente)
      ? '<i data-lucide="shield" style="width:14px;height:14px;color:#4ade80;vertical-align:middle;margin-right:4px;flex-shrink:0" title="Produtivo"></i>'
      : '<i data-lucide="code" style="width:14px;height:14px;color:#fb923c;vertical-align:middle;margin-right:4px;flex-shrink:0" title="Não-Produtivo"></i>';

    return `<div class="tree-node" id="sv-${hi}">
      <div class="tree-row tree-servidor" onclick="toggleNode('sv-${hi}')">
        <span><span class="tree-toggle">▶</span>${ambIcon}${h.hostname}${h.ip_local ? ` <span style="color:#64748b;font-weight:400">(${h.ip_local})</span>` : ""}</span>
        <span class="tree-num est">${h.ESTABLISHED ? fmt(h.ESTABLISHED) : ""}</span>
        <span class="tree-num syn">${h.SYN_SENT    ? fmt(h.SYN_SENT)    : ""}</span>
        <span class="tree-num tot">${fmt(h.ESTABLISHED + h.SYN_SENT)}</span>
      </div>
      <div class="tree-children" style="display:none">${apps}</div>
    </div>`;
  }).join("");
}

let _ultimosServidores = [];

async function recarregarServidores() {
  const ocvs             = document.getElementById("sel-ocvs").value;
  const ignorarAtual      = document.getElementById("chk-ignorar-atual").checked;
  const ignorarAnteriores = document.getElementById("chk-ignorar-anteriores").checked;
  const esconderDisp      = document.getElementById("chk-dispensaveis") && document.getElementById("chk-dispensaveis").checked;

  const params = new URLSearchParams();
  if (ocvs)              params.set("ocvs", ocvs);
  if (ignorarAtual)      params.set("ignorarAtual", "1");
  if (ignorarAnteriores) params.set("ignorarAnteriores", "1");
  if (esconderDisp)      params.set("esconderDispensaveis", "1");
  const qs = params.toString() ? "?" + params.toString() : "";

  document.getElementById("tree-body").innerHTML = `<div class="loading">Atualizando...</div>`;

  const servidores = await fetch(`${API}/api/onda/${ondaAtual}/servidores-origem${qs}`).then(r => r.json());
  _ultimosServidores = servidores;

  document.getElementById("tree-body").innerHTML = buildTreeLinhas(servidores);
  if (typeof lucide !== "undefined") lucide.createIcons();

  const totalEst = servidores.reduce((s, r) => s + r.ESTABLISHED, 0);
  const totalSyn = servidores.reduce((s, r) => s + r.SYN_SENT, 0);
  const totalRow = document.getElementById("tree-total");
  totalRow.querySelector(".est").textContent = fmt(totalEst);
  totalRow.querySelector(".syn").textContent = fmt(totalSyn);
  totalRow.querySelector(".tot").textContent = fmt(totalEst + totalSyn);

  // Mensagem de maturidade — aparece quando ambos os filtros estão ativos e total = 0
  const msgDiv = document.getElementById("msg-maturidade");
  if (msgDiv) {
    if ((totalEst + totalSyn) === 0 && ignorarAtual && ignorarAnteriores && esconderDisp) {
      msgDiv.innerHTML = `<div style="margin-top:16px;padding:16px;background:#14532d;border:1px solid #166534;
                  border-radius:8px;display:flex;align-items:center;gap:12px">
        <span style="font-size:1.5rem">✅</span>
        <div>
          <div style="color:#86efac;font-weight:600;font-size:0.9rem">Esta onda está madura para execução.</div>
          <div style="color:#4ade80;font-size:0.82rem;margin-top:3px">Não existem comunicações que podem quebrar com a migração destas VMs.</div>
        </div>
      </div>`;
    } else {
      msgDiv.innerHTML = "";
    }
  }
}

function panelServidoresHTML(servidores) {
  const totalEst = servidores.reduce((s, r) => s + r.ESTABLISHED, 0);
  const totalSyn = servidores.reduce((s, r) => s + r.SYN_SENT, 0);

  return `<div class="panel" id="painel-servidores">
    <h2>Mapa de Conexões <span class="badge">ESTABLISHED + SYN_SENT apenas</span>
      <button class="btn-refresh" style="margin-left:auto;font-size:0.78rem;padding:4px 12px;background:#334155;white-space:nowrap"
              onclick="exportarServidoresHTML()">&#11123; Exportar HTML</button>
    </h2>
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px">
      <input class="search" id="srv-search" placeholder="Filtrar por hostname..."
             oninput="filtrarServidores(this.value)" style="margin:0;flex:1">
      <label style="display:flex;align-items:center;gap:6px;font-size:0.82rem;color:#94a3b8;cursor:pointer;white-space:nowrap">
        <input type="checkbox" id="chk-ignorar-atual" onchange="recarregarServidores()"
               checked style="width:14px;height:14px;cursor:pointer;accent-color:#ef4444">
        Ignorar onda atual
      </label>
      <label style="display:flex;align-items:center;gap:6px;font-size:0.82rem;color:#94a3b8;cursor:pointer;white-space:nowrap">
        <input type="checkbox" id="chk-ignorar-anteriores" onchange="recarregarServidores()"
               checked style="width:14px;height:14px;cursor:pointer;accent-color:#f59e0b">
        Ignorar ondas anteriores
      </label>
      <label style="display:flex;align-items:center;gap:6px;font-size:0.82rem;color:#94a3b8;cursor:pointer;white-space:nowrap">
        <input type="checkbox" id="chk-dispensaveis" onchange="recarregarServidores()"
               checked style="width:14px;height:14px;cursor:pointer;accent-color:#f59e0b">
        Ignorar AD/Zabbix
      </label>
    </div>
    <div class="tree">
      <div class="tree-row tree-header">
        <span>
          <button id="btn-expandir" onclick="event.stopPropagation();toggleExpandirTudo()"
                  style="background:none;border:1px solid #475569;color:#64748b;cursor:pointer;
                         font-size:0.68rem;padding:1px 6px;border-radius:4px;margin-right:8px;vertical-align:middle"
                  title="Expandir / Recolher tudo">&#9660;</button>
          Servidor / Aplicação / IP Remoto
        </span>
        <span class="tree-num est">ESTABLISHED</span>
        <span class="tree-num syn">SYN_SENT</span>
        <span class="tree-num tot">Total</span>
      </div>
      <div id="tree-body">${buildTreeLinhas(servidores)}</div>
      <div id="tree-total" class="tree-row tree-servidor" style="border-left-color:#475569;margin-top:8px;cursor:default">
        <span>Total Geral</span>
        <span class="tree-num est">${fmt(totalEst)}</span>
        <span class="tree-num syn">${fmt(totalSyn)}</span>
        <span class="tree-num tot">${fmt(totalEst + totalSyn)}</span>
      </div>
      <div id="msg-maturidade"></div>
    </div>
  </div>`;
}

function toggleNode(id) {
  const node = document.getElementById(id);
  if (!node) return;
  const children = node.querySelector(".tree-children");
  const toggle   = node.querySelector(".tree-toggle");
  if (!children) return;
  const isOpen = children.style.display !== "none";
  children.style.display = isOpen ? "none" : "block";
  if (toggle) toggle.textContent = isOpen ? "▶" : "▼";
}

function filtrarServidores(q) {
  const ql = q.toLowerCase();
  document.querySelectorAll("#tree-body > .tree-node").forEach(node => {
    const label = node.querySelector(".tree-servidor span:first-child").textContent.toLowerCase();
    node.style.display = (!ql || label.includes(ql)) ? "" : "none";
  });
}

let _treeExpandido = false;
function toggleExpandirTudo() {
  _treeExpandido = !_treeExpandido;
  const btn = document.getElementById("btn-expandir");
  document.querySelectorAll("#tree-body .tree-children").forEach(ch => {
    ch.style.display = _treeExpandido ? "block" : "none";
  });
  document.querySelectorAll("#tree-body .tree-toggle").forEach(tg => {
    tg.textContent = _treeExpandido ? "▼" : "▶";
  });
  if (btn) btn.innerHTML = _treeExpandido ? "&#9650;" : "&#9660;";
  if (btn) btn.title = _treeExpandido ? "Recolher tudo" : "Expandir tudo";
}

function exportarServidoresHTML() {
  const dados = _ultimosServidores;
  if (!dados || dados.length === 0) { alert("Nenhum dado para exportar."); return; }

  const ondaLabel = `Onda ${ondaAtual}`;
  const agora = new Date().toLocaleString("pt-BR");

  // Gerar árvore HTML com toggle via JS inline
  let treeHTML = '';
  dados.forEach((h, hi) => {
    const apps = h.aplicacoes.map((a, ai) => {
      const ips = a.ips.map((i, ii) => {
        const portas = i.portas.map(p =>
          `<div class="row porta"><span>${esc(p.fmt)}</span><span class="n est">${p.ESTABLISHED||''}</span><span class="n syn">${p.SYN_SENT||''}</span><span class="n tot">${p.ESTABLISHED+p.SYN_SENT}</span></div>`
        ).join('');
        const ondaTag = i.onda_destino && /Onda\\s+\\d+/i.test(i.onda_destino)
          ? '<span class="onda-tag ok">(' + esc(i.onda_destino) + ')</span>'
          : '<span class="onda-tag sem">Sem onda planejada</span>';
        return `<div class="node"><div class="row ip" onclick="tog(this)"><span><b class="tg">▶</b>${esc(i.ip)} ${ondaTag}</span><span class="n est">${i.ESTABLISHED||''}</span><span class="n syn">${i.SYN_SENT||''}</span><span class="n tot">${i.ESTABLISHED+i.SYN_SENT}</span></div><div class="ch" style="display:none">${portas}</div></div>`;
      }).join('');
      return `<div class="node"><div class="row app" onclick="tog(this)"><span><b class="tg">▶</b>${esc(a.nome)}</span><span class="n est">${a.ESTABLISHED||''}</span><span class="n syn">${a.SYN_SENT||''}</span><span class="n tot">${a.ESTABLISHED+a.SYN_SENT}</span></div><div class="ch" style="display:none">${ips}</div></div>`;
    }).join('');
    const isProd = h.ambiente && /prod/i.test(h.ambiente) && !/n[aã]o/i.test(h.ambiente);
    const ambSvg = isProd
      ? '<svg style="width:14px;height:14px;vertical-align:middle;margin-right:4px" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>'
      : '<svg style="width:14px;height:14px;vertical-align:middle;margin-right:4px" viewBox="0 0 24 24" fill="none" stroke="#fb923c" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>';
    treeHTML += `<div class="node"><div class="row srv" onclick="tog(this)"><span><b class="tg">▶</b>${ambSvg}${esc(h.hostname)}${h.ip_local ? ' <small>('+esc(h.ip_local)+')</small>' : ''}</span><span class="n est">${h.ESTABLISHED||''}</span><span class="n syn">${h.SYN_SENT||''}</span><span class="n tot">${h.ESTABLISHED+h.SYN_SENT}</span></div><div class="ch" style="display:none">${apps}</div></div>`;

function renderPizza(d) {
  const canvas = document.getElementById("pizza-canvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;
  const rOuter = Math.min(W,H)/2 - 8;
  const rInner = rOuter * 0.52;

  const fatias = [
    { label: "Externa — rede privada", valor: d.externoPrivado, cor: "#475569", cat: "fora_ocvs" },
    { label: "Externa — IP público",   valor: d.externoPublico, cor: "#94a3b8", cat: "fora_ocvs" },
    { label: "Ondas anteriores",       valor: d.ondaAnterior,   cor: "#3b82f6", cat: "onda_anterior" },
    { label: "Mesma onda",             valor: d.mesmaOnda,      cor: "#22c55e", cat: "mesma_onda" },
    { label: "Vão causar problemas",   valor: d.problema,       cor: "#ef4444", cat: "nao_mapeado" },
  ].filter(f => f.valor > 0);

  const total = fatias.reduce((s, f) => s + f.valor, 0);
  if (total === 0) return;

  canvas._fatias = [];
  let angulo = -Math.PI / 2;

  fatias.forEach(f => {
    const sweep = (f.valor / total) * Math.PI * 2;
    const aStart = angulo, aEnd = angulo + sweep;

    ctx.shadowColor = "rgba(0,0,0,0.35)";
    ctx.shadowBlur  = 8;
    ctx.beginPath();
    ctx.moveTo(cx + rInner * Math.cos(aStart), cy + rInner * Math.sin(aStart));
    ctx.arc(cx, cy, rOuter, aStart, aEnd);
    ctx.arc(cx, cy, rInner, aEnd, aStart, true);
    ctx.closePath();
    ctx.fillStyle = f.cor;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = "#0f172a";
    ctx.lineWidth = 2;
    ctx.stroke();

    canvas._fatias.push({ ...f, aStart, aEnd });
    angulo += sweep;
  });

  const center = document.getElementById("pizza-center");
  if (center) {
    center.innerHTML = '<div style="font-size:1.1rem;font-weight:700;color:#f1f5f9">' + fmt(total) + '</div><div style="font-size:0.65rem;color:#64748b">conexoes</div>';
  }

  const leg = document.getElementById("pizza-legenda");
  if (leg) {
    leg.innerHTML = fatias.map(f => {
      const pct = Math.round(f.valor * 100 / total);
      return '<div onclick="abrirDrilldown(\'' + f.cat + '\',\'' + f.label.replace(/'/g,"\\'") + '\')" '
        + 'style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;cursor:pointer;border-left:3px solid ' + f.cor + ';transition:background 0.15s" '
        + 'onmouseover="this.style.background=\'#263348\'" onmouseout="this.style.background=\'\'">'
        + '<div style="flex:1">'
        + '<div style="color:#e2e8f0;font-weight:500">' + f.label + '</div>'
        + '<div style="color:#64748b;font-size:0.75rem;margin-top:2px">' + fmt(f.valor) + ' conexoes</div>'
        + '</div>'
        + '<div style="font-size:1.1rem;font-weight:700;color:' + f.cor + '">' + pct + '%</div>'
        + '</div>';
    }).join("");
  }

  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left - cx, my = e.clientY - rect.top - cy;
    const dist = Math.sqrt(mx*mx + my*my);
    if (dist < rInner || dist > rOuter) { canvas.style.cursor = "default"; return; }
    let ang = Math.atan2(my, mx);
    if (ang < -Math.PI/2) ang += Math.PI*2;
    const hit = canvas._fatias.find(f => {
      const s = f.aStart < -Math.PI/2 ? f.aStart + Math.PI*2 : f.aStart;
      const en = f.aEnd < -Math.PI/2 ? f.aEnd + Math.PI*2 : f.aEnd;
      return ang >= s && ang <= en;
    });
    canvas.style.cursor = hit ? "pointer" : "default";
  };

  canvas.onclick = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left - cx, my = e.clientY - rect.top - cy;
    const dist = Math.sqrt(mx*mx + my*my);
    if (dist < rInner || dist > rOuter) return;
    let ang = Math.atan2(my, mx);
    if (ang < -Math.PI/2) ang += Math.PI*2;
    const hit = canvas._fatias.find(f => {
      const s = f.aStart < -Math.PI/2 ? f.aStart + Math.PI*2 : f.aStart;
      const en = f.aEnd < -Math.PI/2 ? f.aEnd + Math.PI*2 : f.aEnd;
      return ang >= s && ang <= en;
    });
    if (hit) abrirDrilldown(hit.cat, hit.label);
  };
}

// ── Gráfico de SO (drill-down) ────────────────────────────────────────────────
let _soDados = null;

async function carregarDistribuicaoSO() {
  try {
    _soDados = await fetch(`${API}/api/onda/${ondaAtual}/distribuicao-so`).then(r => r.json());
    if (_soDados.erro) { document.getElementById("so-legenda").innerHTML = `<span style="color:#64748b">${_soDados.erro}</span>`; return; }
    renderSOPizza();
  } catch (e) {
    document.getElementById("so-legenda").innerHTML = `<span style="color:#f87171">Erro: ${e.message}</span>`;
  }
}

function renderSOPizza(familia) {
  const canvas = document.getElementById("so-canvas");
  if (!canvas || !_soDados) return;

  const cores = {
    "Windows": "#3b82f6", "Linux": "#f59e0b", "Outro": "#6b7280",
  };
  const coresVersao = ["#60a5fa","#34d399","#fbbf24","#f87171","#a78bfa","#fb923c","#38bdf8","#4ade80","#e879f9","#94a3b8"];

  let fatias = [];
  let voltarVisivel = false;

  if (!familia) {
    // Nível 1: Windows vs Linux vs Outro
    for (const [fam, dados] of Object.entries(_soDados)) {
      fatias.push({ label: fam, valor: dados.total, cor: cores[fam] || "#6b7280", familia: fam });
    }
  } else {
    // Nível 2: versões dentro da família
    voltarVisivel = true;
    const dados = _soDados[familia];
    if (!dados) return;
    let ci = 0;
    for (const [versao, qtd] of Object.entries(dados.versoes).sort((a,b) => b[1]-a[1])) {
      fatias.push({ label: versao, valor: qtd, cor: coresVersao[ci % coresVersao.length] });
      ci++;
    }
  }

  fatias = fatias.filter(f => f.valor > 0);
  const total = fatias.reduce((s, f) => s + f.valor, 0);
  if (total === 0) return;

  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;
  const rOuter = Math.min(W,H)/2 - 8;
  const rInner = rOuter * 0.52;

  ctx.clearRect(0, 0, W, H);
  canvas._soFatias = [];
  let angulo = -Math.PI / 2;

  fatias.forEach(f => {
    const sweep = (f.valor / total) * Math.PI * 2;
    const aStart = angulo, aEnd = angulo + sweep;

    ctx.shadowColor = "rgba(0,0,0,0.35)";
    ctx.shadowBlur  = 8;
    ctx.beginPath();
    ctx.moveTo(cx + rInner * Math.cos(aStart), cy + rInner * Math.sin(aStart));
    ctx.arc(cx, cy, rOuter, aStart, aEnd);
    ctx.arc(cx, cy, rInner, aEnd, aStart, true);
    ctx.closePath();
    ctx.fillStyle = f.cor;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = "#0f172a";
    ctx.lineWidth = 2;
    ctx.stroke();

    canvas._soFatias.push({ ...f, aStart, aEnd });
    angulo += sweep;
  });

  // Centro
  const center = document.getElementById("so-center");
  if (center) {
    center.innerHTML = `<div style="font-size:1.1rem;font-weight:700;color:#f1f5f9">${total}</div><div style="font-size:0.65rem;color:#64748b">${familia || 'servidores'}</div>`;
  }

  // Legenda
  const leg = document.getElementById("so-legenda");
  if (leg) {
    leg.innerHTML = fatias.map(f => {
      const pct = Math.round(f.valor * 100 / total);
      let onclick = '';
      if (f.familia) {
        onclick = ` onclick="renderSOPizza('${f.familia}')" style="cursor:pointer"`;
      } else if (familia) {
        // Nível 2: versão específica — clicável para drilldown
        onclick = ` onclick="abrirSODrilldown('${f.label.replace(/'/g,"\\'")}')" style="cursor:pointer"`;
      }
      return `<div${onclick} style="display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:6px;border-left:3px solid ${f.cor};transition:background 0.15s"
        onmouseover="this.style.background='#263348'" onmouseout="this.style.background=''">
        <div style="flex:1">
          <div style="color:#e2e8f0;font-weight:500">${f.label}</div>
          <div style="color:#64748b;font-size:0.75rem;margin-top:2px">${f.valor} servidor${f.valor > 1 ? 'es' : ''}</div>
        </div>
        <div style="font-size:1.1rem;font-weight:700;color:${f.cor}">${pct}%</div>
      </div>`;
    }).join("");
  }

  // Click no canvas para drill-down
  canvas.onclick = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left - cx, my = e.clientY - rect.top - cy;
    const dist = Math.sqrt(mx*mx + my*my);
    if (dist < rInner || dist > rOuter) return;
    let ang = Math.atan2(my, mx);
    if (ang < -Math.PI/2) ang += Math.PI*2;
    const hit = canvas._soFatias.find(f => {
      let s = f.aStart, en = f.aEnd;
      if (s < -Math.PI/2) s += Math.PI*2;
      if (en < -Math.PI/2) en += Math.PI*2;
      return ang >= s && ang <= en;
    });
    if (hit) {
      if (hit.familia) renderSOPizza(hit.familia);
      else if (familia) abrirSODrilldown(hit.label);
    }
  };

  canvas.style.cursor = familia ? "default" : "pointer";

  // Botão voltar
  const btnVoltar = document.getElementById("so-voltar");
  if (btnVoltar) btnVoltar.style.display = voltarVisivel ? "" : "none";
}

async function abrirSODrilldown(versao) {
  const modal = document.getElementById("modal-root");
  modal.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)fecharModal()">
      <div class="modal" style="max-width:700px">
        <div class="modal-header">
          <div><h3>${versao}</h3><div class="sub">Servidores da Onda ${ondaAtual} com este SO</div></div>
          <button class="modal-close" onclick="fecharModal()">&#x2715;</button>
        </div>
        <div class="modal-body" style="padding:0">
          <div class="loading">Carregando...</div>
        </div>
      </div>
    </div>`;

  try {
    const servidores = await fetch(`${API}/api/onda/${ondaAtual}/so-drilldown/${encodeURIComponent(versao)}`).then(r => r.json());

    const rows = servidores.map(s => {
      const isProd = s.ambiente && /prod/i.test(s.ambiente) && !/n[aã]o/i.test(s.ambiente);
      const icon = s.ambiente
        ? (isProd
          ? '<i data-lucide="shield" style="width:13px;height:13px;color:#4ade80;vertical-align:middle;margin-right:3px" title="Produtivo"></i>'
          : '<i data-lucide="code" style="width:13px;height:13px;color:#fb923c;vertical-align:middle;margin-right:3px" title="Não-Produtivo"></i>')
        : '';
      return `<tr>
        <td>${icon}${s.hostname}</td>
        <td>${s.ip || '-'}</td>
        <td>${s.ambiente || '-'}</td>
      </tr>`;
    }).join("");

    document.querySelector(".modal-body").innerHTML = `
      <div style="overflow-x:auto">
      <table>
        <thead><tr><th>Hostname</th><th>IP</th><th>Ambiente</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="3" class="empty">Nenhum servidor encontrado</td></tr>'}</tbody>
      </table></div>
      <div style="padding:10px 20px;font-size:0.75rem;color:#475569">${servidores.length} servidor${servidores.length !== 1 ? 'es' : ''}</div>`;
    if (typeof lucide !== "undefined") lucide.createIcons();
  } catch (e) {
    document.querySelector(".modal-body").innerHTML = `<div class="alert" style="margin:20px">Erro: ${e.message}</div>`;
  }
}

async function abrirDrilldown(categoria, label) {
  const ocvs = document.getElementById("sel-ocvs").value;
  const qs   = ocvs ? `?ocvs=${ocvs}` : "";

  const modal = document.getElementById("modal-root");
  modal.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)fecharModal()">
      <div class="modal">
        <div class="modal-header">
          <div>
            <h3>Drilldown &mdash; ${label}</h3>

          </div>
          <button class="modal-close" onclick="fecharModal()">&#x2715;</button>

        <div class="modal-body">
          <div class="loading">Carregando...</div>
        </div>
      </div>
    </div>`;

  const dados = await fetch(`${API}/api/onda/${ondaAtual}/drilldown/${categoria}${qs}`)

function renderDrillTabela(dados) {
  const rows = dados.map(r => `<tr>
    <td>${ambienteIcon(r.hostname)}${r.hostname}</td>
    <td>${r.ip_remoto}</td>
    <td>${r.porta_remota}</td>

        title="${r.onda_destino}">${r.onda_destino || "-"}</td>

      <thead><tr>
        <th>Servidor origem</th><th>IP destino</th><th>Porta</th>
        <th>Aplicação</th><th>Dir.</th><th>Onda origem</th><th>Onda destino</th>
        <th>OCVS</th><th>Qtde</th>
      </tr></thead>
      <tbody>${rows || `<tr><td colspan="9" class="empty">Sem dados</td></tr>`}</tbody>
    </table></div>
    <div style="padding:10px 20px;font-size:0.75rem;color:#475569">
      ${fmt(dados.length)} registros &middot; ${fmt(dados.reduce((s,r)=>s+r.contador,0))} conexões
    </div>`;
  if (typeof lucide !== "undefined") lucide.createIcons();
}

function filtrarDrill(q) {
  const ql = q.toLowerCase();
  const filtrado = q ? window._drillDados.filter(r =>
    r.hostname.toLowerCase().includes(ql) ||
    r.ip_remoto.toLowerCase().includes(ql) ||
    (r.aplicacao || r.processo || "").toLowerCase().includes(ql) ||
    (r.onda_destino || "").toLowerCase().includes(ql)
  ) : window._drillDados;
  renderDrillTabela(filtrado);
}

            </div>
            <button class="btn-exec btn-run" id="btn-carregar" onclick="carregarServidores()"
                    style="background:#0369a1">&#128269; Carregar Servidores</button>
            ` : `
            <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
              <button class="btn-exec btn-run" id="btn-run" onclick="executarScript('${script}')"
                      style="background:${cor}">&#9654; Executar</button>
              <label style="display:flex;align-items:center;gap:5px;font-size:0.8rem;color:#94a3b8;cursor:pointer">
                <input type="checkbox" id="chk-forcar" style="width:13px;height:13px;cursor:pointer;accent-color:#ef4444">
                Forçar reprocessamento
              </label>
              <label style="display:flex;align-items:center;gap:5px;font-size:0.8rem;color:#94a3b8;cursor:pointer">
                <input type="checkbox" id="chk-publicos" style="width:13px;height:13px;cursor:pointer;accent-color:#3b82f6">
                Incluir IPs públicos
              </label>
            </div>
            `}
          </div>
          <div id="lista-servidores" style="display:none;margin-top:12px"></div>
        </div>
        <div class="modal-body" style="padding:0">
          <div class="terminal" id="terminal">
            <span class="info">Preencha os campos e clique em ${script === "coletar" ? "Carregar Servidores" : "Executar"}.</span>
          </div>
        </div>
      </div>
    </div>`;
}

async function carregarServidores() {
  const onda = document.getElementById("exec-onda").value.trim();
  if (!onda) { alert("Informe o número da onda."); return; }

  const btn = document.getElementById("btn-carregar");
  btn.disabled = true; btn.textContent = "Carregando...";

  const servidores = await fetch(`${API}/api/onda-servidores/${onda}`).then(r => r.json());

  btn.disabled = false; btn.textContent = "↻ Recarregar";

  if (servidores.erro || !servidores.length) {
    document.getElementById("lista-servidores").innerHTML =
      `<div style="color:#f87171;font-size:0.85rem">${servidores.erro || "Nenhum servidor encontrado para esta onda."}</div>`;
    document.getElementById("lista-servidores").style.display = "";
    return;
  }

  const items = servidores.map((s, i) => `
    <label style="display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:4px;cursor:pointer;font-size:0.83rem"
           onmouseover="this.style.background='#263348'" onmouseout="this.style.background=''">
      <input type="checkbox" class="chk-servidor" value="${s.ip}" checked
             onchange="sincronizarMestre()"
             style="width:14px;height:14px;accent-color:#22c55e;cursor:pointer">
      <span style="color:#f1f5f9;font-weight:500">${s.hostname || s.ip}</span>
      <span style="color:#64748b">${s.hostname ? s.ip : ""}</span>
    </label>`).join("");

  document.getElementById("lista-servidores").innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:0.82rem;color:#94a3b8">
        <input type="checkbox" id="chk-todos" checked onchange="toggleTodos(this.checked)"
               style="width:14px;height:14px;accent-color:#3b82f6;cursor:pointer">
        <span>${servidores.length} servidores</span>
      </label>
    </div>
    <div style="max-height:180px;overflow-y:auto;border:1px solid #334155;border-radius:6px;padding:4px">${items}</div>
    <div style="margin-top:12px;text-align:right">
      <button class="btn-exec btn-run" id="btn-run" onclick="executarScript('coletar')" style="background:#16a34a">
        &#9654; Executar Coleta
      </button>
    </div>`;
  document.getElementById("lista-servidores").style.display = "";
  document.getElementById("exec-sub").textContent = "Selecione os servidores e clique em Executar Coleta";
}

function toggleTodos(marcar) {
  document.querySelectorAll(".chk-servidor").forEach(c => c.checked = marcar);
  const mestre = document.getElementById("chk-todos");
  if (mestre) mestre.checked = marcar;
}

function sincronizarMestre() {
  const todos   = [...document.querySelectorAll(".chk-servidor")];
  const mestre  = document.getElementById("chk-todos");
  if (!mestre) return;
  const marcados = todos.filter(c => c.checked).length;
  mestre.checked       = marcados === todos.length;
  mestre.indeterminate = marcados > 0 && marcados < todos.length;
}

async function executarScript(script) {
  const onda    = document.getElementById("exec-onda").value.trim();
  const usuario = document.getElementById("exec-usuario")?.value.trim() || "migracao";
  const senha   = document.getElementById("exec-senha")?.value || "";

  if (!onda) { alert("Informe o número da onda."); return; }

  // Coletar IPs selecionados (apenas para coleta)
  let servidoresSelecionados = "";
  if (script === "coletar") {
    const chks = [...document.querySelectorAll(".chk-servidor:checked")];
    if (chks.length === 0) { alert("Selecione ao menos um servidor."); return; }
    servidoresSelecionados = chks.map(c => c.value).join(",");
  }

  const btn = document.getElementById("btn-run");
  btn.disabled = true;
  btn.textContent = "Executando...";

  const term = document.getElementById("terminal");
  term.innerHTML = "";

  // Prevenir duplo envio
  if (window._execRunning) return;
  window._execRunning = true;

  const addLinha = (linha, tipo) => {
    // Detectar tipo pela linha se nao informado
    if (!tipo || tipo === "log") {
      const l = linha.trim();
      if (/^\s*v /.test(l) || /sucesso|concluido|ok\b/i.test(l))  tipo = "sucesso";
      else if (/^\s*x /.test(l) || /falha|erro|fail/i.test(l))    tipo = "erro";
      else if (/^\s*! /.test(l) || /aviso|warn|aten/i.test(l))    tipo = "warn";
      else if (/^={3,}|^-{3,}/.test(l))                           tipo = "sep";
      else if (/iniciando|lendo|organizando|consolidando|adicionando|verificando|copiando|transferindo|extraindo/i.test(l)) tipo = "info";
    }
    const span = document.createElement("span");
    span.className = tipo || "log";
    span.textContent = linha;
    term.appendChild(span);
    term.appendChild(document.createElement("br"));
    term.scrollTop = term.scrollHeight;
  };

  try {
    const forcar = document.getElementById("chk-forcar")?.checked || false;
    const incluirPublicos = document.getElementById("chk-publicos")?.checked || false;

    const resp = await fetch(`${API}/api/executar`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ script, onda, usuario, senha, servidoresSelecionados, forcar, incluirPublicos }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const events = buffer.split("\n\n");
      buffer = events.pop();
      for (const ev of events) {
        const dataLine = ev.split("\n").find(l => l.startsWith("data:"));
        if (!dataLine) continue;
        try {
          const obj = JSON.parse(dataLine.slice(5));
          if (obj.tipo === "fim") {
            btn.disabled = false;
            btn.textContent = "▶ Executar";
            window._execRunning = false;
            // Atualizar lista de ondas
            const ondas = await fetch(`${API}/api/ondas`).then(r => r.json());
            const sel = document.getElementById("sel-onda");
            sel.innerHTML = '<option value="">-- selecione --</option>';
            ondas.forEach(o => {
              const opt = document.createElement("option");
              opt.value = o; opt.textContent = `Onda ${o}`;
              sel.appendChild(opt);
            });
            // Se estiver na home, recarregar para atualizar status das ondas
            if (!ondaAtual) renderHome();
          } else {
            addLinha(obj.linha, obj.tipo);
          }
        } catch {}
      }
    }
  } catch (e) {
    addLinha("Erro de conexão: " + e.message, "erro");
    btn.disabled = false;
    btn.textContent = "▶ Executar";
    window._execRunning = false;
  }
}



async function atualizarBadgeFonte() {
  const badge = document.getElementById("db-badge");
  if (!badge || !ondaAtual) return;
  try {
    const status = await fetch(`${API}/api/db/status`).then(r => r.json());
    const ondaInfo = (status.ondas || []).find(o => String(o.numero) === String(ondaAtual));
    if (ondaInfo && ondaInfo.ingerida) {
      badge.style.display = "";
      badge.style.background = "#14532d";
      badge.style.color = "#86efac";
      badge.style.border = "1px solid #166534";
      badge.title = `${ondaInfo.conexoes.toLocaleString("pt-BR")} conexões no banco`;
      badge.textContent = "⬡ SQLite";
    } else {
      badge.style.display = "";
      badge.style.background = "#422006";
      badge.style.color = "#fcd34d";
      badge.style.border = "1px solid #78350f";
      badge.title = "Onda não ingerida — lendo do arquivo .txt";
      badge.textContent = "⬡ .txt";
    }
  } catch {
    badge.style.display = "none";
  }
}

// ── Modal de confirmação estilizado ───────────────────────────────────────────
function confirmarAcao(titulo, descricao, labelOk) {
  return new Promise(resolve => {
    const modal = document.getElementById("modal-root");
    modal.innerHTML = `
      <div class="modal-overlay" onclick="if(event.target===this){document.getElementById('modal-root').innerHTML='';window._confirmarResolve(false)}">
        <div class="modal" style="max-width:480px">
          <div class="modal-header">
            <div><h3>${titulo}</h3></div>
            <button class="modal-close" onclick="document.getElementById('modal-root').innerHTML='';window._confirmarResolve(false)">&#x2715;</button>
          </div>
          <div style="padding:20px;font-size:0.88rem;color:#cbd5e1;line-height:1.6">
            ${descricao}
          </div>
          <div style="padding:12px 20px;border-top:1px solid #334155;display:flex;justify-content:flex-end;gap:10px">
            <button class="btn-refresh" style="background:#334155;color:#94a3b8"
                    onclick="document.getElementById('modal-root').innerHTML='';window._confirmarResolve(false)">Cancelar</button>
            <button class="btn-refresh" style="background:#1d4ed8"
                    onclick="document.getElementById('modal-root').innerHTML='';window._confirmarResolve(true)">${labelOk}</button>
          </div>
        </div>
      </div>`;
    window._confirmarResolve = resolve;
  });
}

async function atualizarTodasOndas() {
  const ok = await confirmarAcao(
    "Atualizar Ondas",
    `<p>Lê a planilha Excel e atualiza a composição de <strong>todas as ondas</strong> no banco de dados.</p>
     <p style="margin-top:10px;color:#94a3b8;font-size:0.82rem">Use quando você alterou a onda de um ou mais servidores no Excel e quer que o dashboard reflita a mudança sem precisar reprocessar os dados.</p>
     <p style="margin-top:10px;color:#94a3b8;font-size:0.82rem">Os dados de conexão (netstat) não são alterados — apenas o mapeamento de quem pertence a qual onda.</p>`,
    "Atualizar"
  );
  if (!ok) return;

  const btn = event.target.closest("button");
  const orig = btn.innerHTML;
  btn.disabled = true; btn.innerHTML = '<i data-lucide="loader" class="sb-icon" style="animation:spin 1s linear infinite"></i> Atualizando...';
  if (typeof lucide !== "undefined") lucide.createIcons();
  try {
    const r = await fetch(`${API}/api/db/sincronizar-tudo`, { method: "POST" }).then(r => r.json());
    if (r.ok) {
      const qtdOndas = r.resultados.filter(x => x.ok).length;
      const total    = r.resultados.reduce((s, x) => s + (x.membros || 0), 0);
      const err      = r.resultados.filter(x => !x.ok).length;
      const errosDetalhe2 = r.resultados.filter(x => !x.ok).map(x => `Onda ${x.onda}: ${x.erro}`).join("\n");
      alert(`Ondas atualizadas: ${qtdOndas} onda(s), ${total} servidores no total${err ? `\n${err} com erro:\n${errosDetalhe2}` : ""}.`);
      if (ondaAtual) renderDashboard();
    } else {
      alert(`Erro: ${r.erro}`);
    }
  } catch (e) {
    alert(`Erro: ${e.message}`);
  } finally {
    btn.disabled = false; btn.innerHTML = orig;
    if (typeof lucide !== "undefined") lucide.createIcons();
  }
}

async function reingerirTudo() {
  const ok = await confirmarAcao(
    "Reingerir Banco",
    `<p>Reconstrói o banco de dados SQLite a partir dos arquivos <strong>.txt processados</strong> de todas as ondas.</p>
     <p style="margin-top:10px;color:#94a3b8;font-size:0.82rem">Use quando o banco estiver desatualizado, corrompido, ou após uma atualização do sistema que alterou a estrutura dos dados.</p>
     <p style="margin-top:10px;color:#94a3b8;font-size:0.82rem">Pode demorar alguns segundos dependendo do volume de dados.</p>`,
    "Reingerir"
  );
  if (!ok) return;

  const btn = event.target.closest("button");
  const orig = btn.innerHTML;
  btn.disabled = true; btn.innerHTML = '<i data-lucide="loader" class="sb-icon" style="animation:spin 1s linear infinite"></i> Reingerindo...';
  if (typeof lucide !== "undefined") lucide.createIcons();
  try {
    const r = await fetch(`${API}/api/db/reingerir-tudo`, { method: "POST" }).then(r => r.json());
    if (r.ok) {
      const qtdOk  = r.resultados.filter(x => x.ok).length;
      const qtdErr = r.resultados.filter(x => !x.ok).length;
      const errosDetalhe = r.resultados.filter(x => !x.ok).map(x => `Onda ${x.onda}: ${x.erro}`).join("\n");
      alert(`Reingestão concluída: ${qtdOk} onda(s) OK${qtdErr ? `\n${qtdErr} com erro:\n${errosDetalhe}` : ""}.`);
      if (ondaAtual) renderDashboard();
    } else {
      alert(`Erro: ${r.erro}`);
    }
  } catch (e) {
    alert(`Erro: ${e.message}`);
  } finally {
    btn.disabled = false; btn.innerHTML = orig;
    if (typeof lucide !== "undefined") lucide.createIcons();
  }
}

init();

// ── Logs de execução ──────────────────────────────────────────────────────────
async function sincronizarOnda() {
  if (!ondaAtual) { alert("Selecione uma onda primeiro."); return; }
  const btn = event.target;
  btn.disabled = true; btn.textContent = "Sincronizando...";
  try {
    const r = await fetch(`${API}/api/db/sincronizar-onda`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ onda: ondaAtual }),
    }).then(r => r.json());
    if (r.ok) {
      // Recarregar dashboard com dados atualizados do banco
      await renderDashboard();
      atualizarBadgeFonte();
    } else {
      alert(`Erro: ${r.erro}`);
    }
  } catch (e) {
    alert(`Erro: ${e.message}`);
  } finally {
    btn.disabled = false; btn.textContent = "⇄ Sincronizar Onda";
  }
}

async function abrirLogs() {
  const logs = await fetch(`${API}/api/logs`).then(r => r.json()).catch(() => []);

  const linhas = logs.length ? logs.map(l => {
    const dt   = new Date(l.inicio).toLocaleString("pt-BR");
    const dur  = l.fim ? Math.round((new Date(l.fim) - new Date(l.inicio)) / 1000) + "s" : "em andamento";
    const ok   = l.exitCode === 0;
    const cor  = ok ? "#22c55e" : l.exitCode === null ? "#f59e0b" : "#ef4444";
    const icone = ok ? "v" : l.exitCode === null ? "..." : "x";
    return `<div onclick="abrirLogDetalhe('${l.id}')"
                 style="display:flex;align-items:center;gap:12px;padding:10px 14px;
                        border-radius:6px;cursor:pointer;border-left:3px solid ${cor}"
                 onmouseover="this.style.background='#263348'" onmouseout="this.style.background=''">
      <span style="color:${cor};font-size:1rem;width:16px">${icone}</span>
      <div style="flex:1">
        <div style="color:#f1f5f9;font-weight:500">${l.script} &mdash; Onda ${l.onda}</div>
        <div style="color:#64748b;font-size:0.75rem;margin-top:2px">${dt} &middot; ${dur}</div>
      </div>
      <span style="color:#475569;font-size:0.75rem">&#9654;</span>
    </div>`;
  }).join("") : `<div class="empty" style="padding:20px">Nenhuma execução registrada ainda.</div>`;

  document.getElementById("modal-root").innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)fecharModal()">
      <div class="modal" style="max-width:700px">
        <div class="modal-header">
          <div><h3>Histórico de Execuções</h3><div class="sub">Clique em uma entrada para ver o log completo</div></div>
          <button class="modal-close" onclick="fecharModal()">&#x2715;</button>
        </div>
        <div class="modal-body" style="padding:12px 16px;display:flex;flex-direction:column;gap:6px">
          ${linhas}
        </div>
      </div>
    </div>`;
}

async function abrirLogDetalhe(id) {
  const log = await fetch(`${API}/api/logs/${id}`).then(r => r.json());
  const dt  = new Date(log.inicio).toLocaleString("pt-BR");
  const dur = log.fim ? Math.round((new Date(log.fim) - new Date(log.inicio)) / 1000) + "s" : "em andamento";

  const linhasHtml = (log.linhas || []).map(l =>
    `<span class="${l.tipo || 'log'}">${String(l.linha).replace(/</g,"&lt;")}</span><br>`
  ).join("");

  document.getElementById("modal-root").innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)fecharModal()">
      <div class="modal">
        <div class="modal-header">
          <div>
            <h3>${log.script} &mdash; Onda ${log.onda}</h3>
            <div class="sub">${dt} &middot; ${dur} &middot; exit ${log.exitCode ?? "&mdash;"}</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="btn-refresh" style="background:#334155;font-size:0.8rem" onclick="abrirLogs()">&#8592; Voltar</button>
            <button class="modal-close" onclick="fecharModal()">&#x2715;</button>
          </div>
        </div>
        <div class="modal-body" style="padding:0">
          <div class="terminal" style="height:450px;border-radius:0">${linhasHtml}</div>
        </div>
      </div>
    </div>`;

  setTimeout(() => { const t = document.querySelector(".terminal"); if (t) t.scrollTop = t.scrollHeight; }, 50);
}
